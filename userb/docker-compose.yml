services:

  # ─── PostgreSQL ──────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-nielit}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required in .env}
      POSTGRES_DB: ${DB_NAME:-nielit_community}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-nielit} -d ${DB_NAME:-nielit_community}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── Flask app (Gunicorn) ────────────────────────────────
  web:
    build: .
    image: nielit-community:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required in .env}
      DATABASE_URL: postgresql://${DB_USER:-nielit}:${DB_PASSWORD}@db:5432/${DB_NAME:-nielit_community}
      APP_NAME: ${APP_NAME:-Nielit Community}
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
      MAX_CONTENT_LENGTH_MB: ${MAX_CONTENT_LENGTH_MB:-55}
    volumes:
      - app_uploads:/app/app/static/uploads
    expose:
      - "8000"

  # ─── Caddy reverse proxy with automatic Let's Encrypt ────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"        # HTTP/3
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data          # Certs + cache. KEEP THIS PERSISTENT.
      - caddy_config:/config

volumes:
  postgres_data:
  app_uploads:
  caddy_data:
  caddy_config:
