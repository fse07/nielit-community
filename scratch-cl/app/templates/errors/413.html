{% extends "base.html" %}
{% block title %}File too large · {{ APP_NAME }}{% endblock %}
{% block content %}
<div class="card empty">
  <div class="empty-icon">📦</div>
  <h3>File too large</h3>
  <p>Uploads are capped at {{ max_mb }}MB. Please upload a smaller file.</p>
  <a href="{{ url_for('posts.create') }}" class="btn btn-primary mt-2">Try again</a>
</div>
{% endblock %}
