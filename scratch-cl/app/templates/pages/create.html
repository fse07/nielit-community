{% extends "base.html" %}
{% block title %}Create page · {{ APP_NAME }}{% endblock %}

{% block content %}
<div class="card">
  <div class="card-title">+ Create a page</div>
  <p style="color:var(--text-muted); font-size:.9em; margin-top:-8px;">Pages are for brands, projects, interests, or public profiles. Anyone can follow your page.</p>
  <form method="post" enctype="multipart/form-data">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="form-group">
      <label for="name">Page name</label>
      <input type="text" name="name" id="name" required maxlength="120" placeholder="e.g. NIELIT Updates">
    </div>
    <div class="form-group">
      <label for="category">Category</label>
      <input type="text" name="category" id="category" value="General" maxlength="60" list="cat-list">
      <datalist id="cat-list">
        <option>General</option>
        <option>Education</option>
        <option>Technology</option>
        <option>Community</option>
        <option>Business</option>
        <option>Personal</option>
        <option>Media</option>
        <option>Entertainment</option>
      </datalist>
    </div>
    <div class="form-group">
      <label for="description">Description</label>
      <textarea name="description" id="description" rows="4" maxlength="2000" placeholder="What is your page about?"></textarea>
    </div>
    <div class="form-group">
      <label for="avatar">Profile image</label>
      <input type="file" name="avatar" id="avatar" accept="image/*">
    </div>
    <div class="form-group">
      <label for="cover">Cover image</label>
      <input type="file" name="cover" id="cover" accept="image/*">
    </div>
    <div style="display:flex; justify-content:flex-end; gap:8px;">
      <a href="{{ url_for('pages.index') }}" class="btn">Cancel</a>
      <button type="submit" class="btn btn-primary">Create page</button>
    </div>
  </form>
</div>
{% endblock %}
